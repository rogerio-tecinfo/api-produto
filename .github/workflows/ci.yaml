name: CI - Build, Push & GitOps

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

permissions:
  contents: write   # necessário para o write-back da tag no manifesto

env:
  IMAGE_NAME: rsprazeres/api-produto

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Definir tag da imagem (SHA curto)
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Instalar kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Atualizar tag da imagem no overlay de produção (write-back GitOps)
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

      - name: Commit e push da nova tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          if git diff --staged --quiet; then
            echo "Nenhuma mudança de tag para commitar."
          else
            git commit -m "ci: atualiza imagem para ${{ steps.meta.outputs.tag }} [skip ci]"
            git push
          fi
